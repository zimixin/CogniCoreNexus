# Доменный профиль по умолчанию
# Расширяет основной словарь для конкретной предметной области

domain: "general"
description: "Базовый профиль для общего использования"

extends: "../dictionary.yaml"

# Сокращения для этого домена
shortcuts:
  QRY: "query"
  RSP: "response"
  PRM: "prompt"
  TEMP: "temperature"
  MAXT: "max_tokens"
  STOP: "stop_sequences"

# Шаблоны AAAK-строк для типовых записей
templates:
  dialog_turn: |
    (EVENT dialog_turn
      :time {timestamp}
      :agent {agent}
      :query {query_aaak}
      :response {response_aaak})

  fact_record: |
    (FACT {id}
      :domain {domain}
      :content {content_aaak}
      :confidence {confidence})